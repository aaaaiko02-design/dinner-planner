<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夕飯献立アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>夕飯献立</h1>
      <p id="week-label"></p>
    </header>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="menu">📅 今週の献立</button>
      <button class="tab-btn" data-tab="shopping">🛒 買い物リスト</button>
    </nav>
    <main>
      <section id="menu-tab" class="tab-content active">
        <ul id="menu-list"></ul>
      </section>
      <section id="shopping-tab" class="tab-content">
        <p class="shopping-note">チェックしながら買い物しよう！</p>
        <div id="shopping-list"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
